services:
  postgres:
    image: postgres:16-alpine
    container_name: fp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: faithful_persona
      POSTGRES_USER: fp_app
      POSTGRES_PASSWORD: fp_dev_pwd
    ports:
      # 5433 (host) → 5432 (container) pra não conflitar com outros postgres locais
      - '127.0.0.1:5433:5432'
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fp_app -d faithful_persona']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fp-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
